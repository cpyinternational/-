<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="数学小乐园">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3771/3771278.png">
    
    <title>Fun Math Garden</title>
    <style>
        :root {
            --primary-blue: #0288d1;
            --soft-blue: #e0f7fa;
            --btn-orange: #ffb74d;
            --btn-shadow: #fb8c00;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--soft-blue);
            overflow: hidden; /* Prevent scrolling */
            touch-action: manipulation;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 92%;
            max-width: 500px;
            border: 6px solid #81d4fa;
            box-sizing: border-box;
        }

        /* --- Menu Styles --- */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .menu-btn:active { transform: scale(0.96); }

        /* --- Quiz UI Styles --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 18px;
            color: #546e7a;
            background: #f1f8e9;
            padding: 10px 20px;
            border-radius: 15px;
        }

        .question-box {
            font-size: 56px;
            margin: 15px 0;
            color: #2e7d32;
            font-weight: bold;
            min-height: 70px;
        }

        .answer-display {
            width: 80%;
            height: 60px;
            margin: 0 auto 10px;
            font-size: 42px;
            line-height: 60px;
            border-bottom: 5px solid #b3e5fc;
            color: var(--primary-blue);
            font-weight: bold;
        }

        .feedback {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
            margin-bottom: 10px;
        }

        /* --- Custom Keypad Styles --- */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .key {
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            background: #f5f5f5;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px #ddd;
            cursor: pointer;
            color: #333;
        }
        .key:active {
            transform: translateY(2px);
            box-shadow: 0 1px #ddd;
            background: #e0e0e0;
        }
        .key.action {
            background: var(--btn-orange);
            color: white;
            box-shadow: 0 4px var(--btn-shadow);
        }
        .key.confirm {
            background: #81c784;
            color: white;
            box-shadow: 0 4px #66bb6a;
        }

        .btn-exit {
            margin-top: 15px;
            background: #90a4ae;
            padding: 10px;
            border-radius: 20px;
            color: white;
            border: none;
            width: 100px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="menu-view" class="container">
        <h2 style="color:var(--primary-blue)">🌈 数学小乐园 🌟</h2>
        <button class="menu-btn" style="background:#81c784; box-shadow:0 5px #66bb6a;" onclick="startQuiz('add-1')">一位数加法 🍎</button>
        <button class="menu-btn" style="background:#4fc3f7; box-shadow:0 5px #29b6f6;" onclick="startQuiz('sub-20')">20以内减法 🍬</button>
        <button class="menu-btn" style="background:#ba68c8; box-shadow:0 5px #ab47bc;" onclick="startQuiz('add-2')">两位数加法 🚀</button>
        <button class="menu-btn" style="background:#ef5350; box-shadow:0 5px #e53935;" onclick="startQuiz('sub-2')">两位数减法 🦁</button>
    </div>

    <div id="quiz-view" class="container" style="display: none;">
        <div class="quiz-header">
            <span>⏱️ <span id="timer-display">00:00</span></span>
            <span>⭐ <span id="score-display">0</span> / <span id="total-display">0</span></span>
        </div>
        
        <div id="question-display" class="question-box"></div>
        <div id="feedback-display" class="feedback"></div>
        
        <div id="answer-box" class="answer-display"></div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key action" onclick="pressKey('DEL')">←</button>
            <button class="key" onclick="pressKey('0')">0</button>
            <button class="key confirm" onclick="checkAnswer()">OK</button>
        </div>
        
        <button class="btn-exit" onclick="returnToMenu()">退出 🏠</button>
    </div>

    <script>
        let currentMode = '';
        let timerInterval;
        let secondsElapsed = 0;
        let correctFirstTryCount = 0;
        let totalCompletedCount = 0;
        let expectedAnswer = 0;
        let isFirstAttempt = true;
        let currentInput = "";

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function startQuiz(mode) {
            currentMode = mode;
            secondsElapsed = 0;
            correctFirstTryCount = 0;
            totalCompletedCount = 0;
            updateStatsUI();
            
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                document.getElementById('timer-display').innerText = formatTime(secondsElapsed);
            }, 1000);

            generateNextQuestion();
        }

        function generateNextQuestion() {
            isFirstAttempt = true;
            currentInput = "";
            updateAnswerBox();
            let num1, num2;

            switch (currentMode) {
                case 'add-1':
                    num1 = getRandomInt(1, 9);
                    num2 = getRandomInt(1, 9);
                    expectedAnswer = num1 + num2;
                    displayQuestion(`${num1} + ${num2}`);
                    break;
                case 'sub-20':
                    num1 = getRandomInt(1, 20);
                    let minNum2 = Math.max(0, num1 - 9);
                    num2 = getRandomInt(minNum2, num1);
                    expectedAnswer = num1 - num2;
                    displayQuestion(`${num1} - ${num2}`);
                    break;
                case 'add-2':
                    num1 = getRandomInt(10, 99);
                    num2 = getRandomInt(10, 99);
                    expectedAnswer = num1 + num2;
                    displayQuestion(`${num1} + ${num2}`);
                    break;
                case 'sub-2':
                    num1 = getRandomInt(10, 99);
                    num2 = getRandomInt(10, num1);
                    expectedAnswer = num1 - num2;
                    displayQuestion(`${num1} - ${num2}`);
                    break;
            }
            document.getElementById('feedback-display').innerText = '';
        }

        // Keypad Logic
        function pressKey(val) {
            if (val === 'DEL') {
                currentInput = currentInput.slice(0, -1);
            } else {
                if (currentInput.length < 3) { // Limit to 3 digits
                    currentInput += val;
                }
            }
            updateAnswerBox();
        }

        function updateAnswerBox() {
            document.getElementById('answer-box').innerText = currentInput || "?";
        }

        function checkAnswer() {
            if (currentInput === "") return;
            const userAnswer = parseInt(currentInput, 10);
            const feedback = document.getElementById('feedback-display');

            if (userAnswer === expectedAnswer) {
                totalCompletedCount++;
                if (isFirstAttempt) correctFirstTryCount++;
                feedback.innerHTML = "<span style='color:#43a047'>太棒了！🎉</span>";
                updateStatsUI();
                setTimeout(generateNextQuestion, 800);
            } else {
                isFirstAttempt = false;
                feedback.innerHTML = "<span style='color:#e53935'>不对哦，再试一次！💪</span>";
                currentInput = "";
                updateAnswerBox();
            }
        }

        function updateStatsUI() {
            document.getElementById('score-display').innerText = correctFirstTryCount;
            document.getElementById('total-display').innerText = totalCompletedCount;
            document.getElementById('timer-display').innerText = formatTime(secondsElapsed);
        }

        function returnToMenu() {
            if (confirm("要结束练习吗？")) {
                clearInterval(timerInterval);
                document.getElementById('menu-view').style.display = 'block';
                document.getElementById('quiz-view').style.display = 'none';
            }
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function displayQuestion(text) {
            document.getElementById('question-display').innerText = text + " =";
        }
    </script>
</body>
</html>
